name: smart_travel_planner
description: A Smart Travel Planner with Chat Feature
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4
  provider: ^6.1.1
  http: ^1.1.0
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/